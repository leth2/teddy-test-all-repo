<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Agent Teams — File-based IPC Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; background: #1a1b26; color: #c0caf5; min-height: 100vh; }

.header { background: #24283b; padding: 16px 24px; border-bottom: 1px solid #3b4261; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 16px; color: #7aa2f7; }
.header .subtitle { font-size: 12px; color: #565f89; margin-top: 4px; }
.header .controls { display: flex; gap: 8px; }
.btn { padding: 8px 16px; border: 1px solid #3b4261; background: #1a1b26; color: #c0caf5; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 12px; transition: all 0.2s; }
.btn:hover { background: #3b4261; }
.btn.primary { background: #7aa2f7; color: #1a1b26; border-color: #7aa2f7; }
.btn.primary:hover { background: #89b4fa; }
.btn.danger { border-color: #f7768e; color: #f7768e; }

/* 스텝 정보 바 */
.step-bar { background: #1f2335; padding: 8px 24px; border-bottom: 1px solid #3b4261; }
.step-progress-bar { height: 4px; background: #292e42; border-radius: 2px; margin-bottom: 6px; }
.step-progress-fill { height: 100%; background: linear-gradient(90deg, #7aa2f7, #bb9af7); border-radius: 2px; transition: width 0.3s ease; width: 0%; }
.step-info { display: flex; align-items: center; gap: 12px; }
.step-counter { font-size: 12px; color: #bb9af7; font-weight: 600; white-space: nowrap; }
.step-desc { font-size: 12px; color: #a9b1d6; flex: 1; }

.main { display: grid; grid-template-columns: 280px 1fr 320px; height: calc(100vh - 60px); }

/* 왼쪽: 파일 시스템 */
.panel { border-right: 1px solid #3b4261; overflow-y: auto; }
.panel-title { padding: 12px 16px; font-size: 12px; color: #565f89; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #3b4261; background: #1f2335; position: sticky; top: 0; z-index: 1; }

.file-tree { padding: 8px; }
.tree-item { padding: 4px 8px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 12px; }
.tree-item:hover { background: #292e42; }
.tree-item.dir { color: #7aa2f7; }
.tree-item.file { color: #9ece6a; }
.tree-item.lock { color: #f7768e; animation: pulse 1s ease-in-out infinite; }
.tree-item .icon { width: 14px; text-align: center; }
.tree-indent { padding-left: 16px; }

@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

/* 중앙: 에이전트 뷰 */
.agents-view { display: flex; flex-direction: column; }
.agents-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; flex: 1; overflow-y: auto; }

.agent-card { background: #1f2335; border: 1px solid #3b4261; border-radius: 8px; display: flex; flex-direction: column; min-height: 0; }
.agent-header { padding: 10px 12px; border-bottom: 1px solid #3b4261; display: flex; align-items: center; gap: 8px; }
.agent-dot { width: 8px; height: 8px; border-radius: 50%; }
.agent-name { font-size: 13px; font-weight: 600; }
.agent-role { font-size: 11px; color: #565f89; margin-left: auto; }
.agent-status { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #292e42; }
.agent-status.active { background: #1a472a; color: #9ece6a; }
.agent-status.idle { background: #3b3020; color: #e0af68; }

.agent-inbox { flex: 1; overflow-y: auto; padding: 8px; max-height: 200px; }
.inbox-msg { padding: 6px 8px; margin-bottom: 4px; border-radius: 4px; font-size: 11px; line-height: 1.4; border-left: 3px solid; background: #292e42; }
.inbox-msg.unread { background: #1f2335; border-left-width: 3px; }
.inbox-msg .from { font-weight: 600; font-size: 10px; margin-bottom: 2px; }
.inbox-msg .text { white-space: pre-wrap; word-break: break-word; }
.inbox-msg .time { font-size: 9px; color: #565f89; margin-top: 2px; }

/* 오른쪽: 이벤트 로그 + 태스크 */
.right-panel { border-left: 1px solid #3b4261; display: flex; flex-direction: column; }

.tasks-section { border-bottom: 1px solid #3b4261; max-height: 40%; overflow-y: auto; }
.task-item { padding: 8px 12px; border-bottom: 1px solid #292e42; font-size: 11px; }
.task-item .task-header { display: flex; align-items: center; gap: 6px; }
.task-status { width: 14px; height: 14px; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 10px; }
.task-status.pending { border: 1px solid #565f89; color: #565f89; }
.task-status.in_progress { background: #1a472a; color: #9ece6a; }
.task-status.completed { background: #9ece6a; color: #1a1b26; }
.task-subject { font-weight: 500; }
.task-owner { font-size: 10px; color: #565f89; margin-top: 2px; }

.events-section { flex: 1; overflow-y: auto; }
.event-item { padding: 6px 12px; font-size: 10px; border-bottom: 1px solid #1f2335; display: flex; gap: 8px; }
.event-time { color: #565f89; white-space: nowrap; }
.event-type { padding: 1px 4px; border-radius: 2px; font-size: 9px; }
.event-type.message { background: #1a3a2a; color: #9ece6a; }
.event-type.task_created { background: #1a2a4a; color: #7aa2f7; }
.event-type.task_claimed { background: #3a3020; color: #e0af68; }
.event-type.task_completed { background: #1a472a; color: #73daca; }
.event-type.agent_action { background: #2a1a3a; color: #bb9af7; }
.event-text { color: #a9b1d6; flex: 1; }

/* 파일 내용 모달 */
.file-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
.file-modal.show { display: flex; }
.file-modal-content { background: #1f2335; border: 1px solid #3b4261; border-radius: 8px; width: 600px; max-height: 80vh; overflow: hidden; }
.file-modal-header { padding: 12px 16px; border-bottom: 1px solid #3b4261; display: flex; justify-content: space-between; align-items: center; }
.file-modal-body { padding: 16px; overflow-y: auto; max-height: calc(80vh - 50px); }
.file-modal-body pre { font-size: 11px; white-space: pre-wrap; color: #9ece6a; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🤖 Claude Code Agent Teams — File-based IPC Demo</h1>
    <div class="subtitle">~/.claude/teams/todo-app-design/ — 파일 기반 메시지 통신 시각화</div>
  </div>
  <div class="controls">
    <button class="btn primary" id="autoBtn" onclick="startScenario()">▶ 자동 재생</button>
    <button class="btn" id="stepStartBtn" onclick="startStepMode()" style="border-color:#bb9af7;color:#bb9af7">⏭ 스텝 모드</button>
    <button class="btn" id="nextBtn" onclick="nextStep()" style="display:none;border-color:#9ece6a;color:#9ece6a">⏩ 다음 스텝</button>
    <button class="btn danger" id="resetBtn" onclick="resetScenario()">↺ 리셋</button>
  </div>
</div>

<!-- 스텝 정보 바 -->
<div class="step-bar" id="stepBar" style="display:none">
  <div class="step-progress-bar">
    <div class="step-progress-fill" id="stepProgressFill"></div>
  </div>
  <div class="step-info">
    <span class="step-counter" id="stepCounter">0 / 0</span>
    <span class="step-desc" id="stepDesc"></span>
  </div>
</div>

<div class="main">
  <!-- 왼쪽: 파일 시스템 -->
  <div class="panel">
    <div class="panel-title">📂 파일 시스템 (실시간)</div>
    <div class="file-tree" id="fileTree">
      <div style="padding: 16px; color: #565f89; font-size: 12px;">시나리오를 시작하면 파일이 생성됩니다</div>
    </div>
  </div>

  <!-- 중앙: 에이전트 뷰 -->
  <div class="agents-view">
    <div class="agents-grid" id="agentsGrid"></div>
  </div>

  <!-- 오른쪽: 태스크 + 이벤트 -->
  <div class="right-panel">
    <div class="tasks-section">
      <div class="panel-title">📋 공유 태스크 리스트</div>
      <div id="tasksList"></div>
    </div>
    <div class="events-section">
      <div class="panel-title">📡 이벤트 로그</div>
      <div id="eventLog"></div>
    </div>
  </div>
</div>

<!-- 파일 내용 모달 -->
<div class="file-modal" id="fileModal" onclick="if(event.target===this)closeModal()">
  <div class="file-modal-content">
    <div class="file-modal-header">
      <span id="modalTitle"></span>
      <button class="btn" onclick="closeModal()">✕</button>
    </div>
    <div class="file-modal-body"><pre id="modalContent"></pre></div>
  </div>
</div>

<script>
const AGENTS = {
  lead:       { name: 'lead', role: 'Team Lead', color: '#E8B931', emoji: '🎯' },
  researcher: { name: 'researcher', role: 'Researcher', color: '#4A9EE0', emoji: '🔍' },
  developer:  { name: 'developer', role: 'Developer', color: '#50C878', emoji: '🛠️' },
  reviewer:   { name: 'reviewer', role: 'Reviewer', color: '#E07C4A', emoji: '📝' }
};

let ws;
let agentStates = {};

// WebSocket 연결
function connect() {
  ws = new WebSocket(`ws://${location.host}`);
  ws.onmessage = (e) => {
    const { type, data, timestamp } = JSON.parse(e.data);
    handleEvent(type, data, timestamp);
  };
  ws.onclose = () => setTimeout(connect, 1000);
}

function handleEvent(type, data, timestamp) {
  // 이벤트 로그 추가
  if (type !== 'fs_update') {
    addEventLog(type, data, timestamp);
  }

  switch (type) {
    case 'init':
      initAgentCards();
      break;
    case 'fs_update':
      updateFileTree(data);
      updateTasksList(data.tasks);
      updateInboxes(data.inboxes);
      break;
    case 'message':
      highlightAgent(data.recipient);
      break;
    case 'task_created':
    case 'task_claimed':
    case 'task_completed':
      break;
    case 'agent_action':
      if (data.action === 'idle') setAgentStatus(data.agent, 'idle');
      else setAgentStatus(data.agent, 'active');
      break;
    case 'step_progress': {
      const pct = ((data.currentStep + 1) / data.totalSteps * 100).toFixed(1);
      document.getElementById('stepProgressFill').style.width = `${pct}%`;
      document.getElementById('stepCounter').textContent = `${data.currentStep + 1} / ${data.totalSteps}`;
      document.getElementById('stepDesc').textContent = data.step;
      break;
    }
    case 'step_mode': {
      document.getElementById('stepCounter').textContent = `0 / ${data.totalSteps}`;
      break;
    }
    case 'reset':
      document.getElementById('fileTree').innerHTML = '<div style="padding:16px;color:#565f89;font-size:12px;">시나리오를 시작하면 파일이 생성됩니다</div>';
      document.getElementById('tasksList').innerHTML = '';
      document.getElementById('eventLog').innerHTML = '';
      initAgentCards();
      break;
    case 'scenario_complete':
      addEventLog('complete', { text: '✅ 시나리오 완료!' }, new Date().toISOString());
      break;
  }
}

function initAgentCards() {
  const grid = document.getElementById('agentsGrid');
  grid.innerHTML = '';
  for (const [key, agent] of Object.entries(AGENTS)) {
    agentStates[key] = 'waiting';
    grid.innerHTML += `
      <div class="agent-card" id="card-${key}">
        <div class="agent-header">
          <div class="agent-dot" style="background:${agent.color}"></div>
          <span class="agent-name">${agent.emoji} ${agent.name}</span>
          <span class="agent-role">${agent.role}</span>
          <span class="agent-status" id="status-${key}">대기</span>
        </div>
        <div class="agent-inbox" id="inbox-${key}"></div>
      </div>`;
  }
}

function updateInboxes(inboxes) {
  for (const [name, messages] of Object.entries(inboxes)) {
    const el = document.getElementById(`inbox-${name}`);
    if (!el) continue;
    el.innerHTML = '';
    for (const msg of messages.slice(-8)) {
      const agent = AGENTS[msg.from] || { color: '#565f89', emoji: '?' };
      const cls = msg.read ? '' : 'unread';
      const time = new Date(msg.timestamp).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      el.innerHTML += `
        <div class="inbox-msg ${cls}" style="border-left-color:${msg.color || agent.color}">
          <div class="from" style="color:${msg.color || agent.color}">${agent.emoji} ${msg.from} ${msg.read ? '' : '● NEW'}</div>
          <div class="text">${escapeHtml(msg.text)}</div>
          <div class="time">${time}</div>
        </div>`;
    }
    el.scrollTop = el.scrollHeight;
  }
}

function updateFileTree(snapshot) {
  const el = document.getElementById('fileTree');
  let html = '';
  
  // config.json
  if (snapshot.config) {
    html += `<div class="tree-item file" onclick="showFile('config.json', ${escapeAttr(JSON.stringify(snapshot.config, null, 2))})">
      <span class="icon">📄</span> config.json</div>`;
  }
  
  // inboxes/
  html += `<div class="tree-item dir"><span class="icon">📁</span> inboxes/</div>`;
  for (const [name, msgs] of Object.entries(snapshot.inboxes)) {
    const unread = msgs.filter(m => !m.read).length;
    const badge = unread > 0 ? ` <span style="color:#f7768e">(${unread} new)</span>` : '';
    html += `<div class="tree-indent"><div class="tree-item file" onclick="showFile('inboxes/${name}.json', ${escapeAttr(JSON.stringify(msgs, null, 2))})">
      <span class="icon">💌</span> ${name}.json${badge}</div></div>`;
  }
  
  // lock files
  for (const lock of (snapshot.lockFiles || [])) {
    html += `<div class="tree-indent"><div class="tree-item lock">
      <span class="icon">🔒</span> ${lock}</div></div>`;
  }
  
  // tasks/
  if (snapshot.tasks.length > 0) {
    html += `<div class="tree-item dir"><span class="icon">📁</span> tasks/</div>`;
    for (const task of snapshot.tasks) {
      const icon = task.status === 'completed' ? '✅' : task.status === 'in_progress' ? '🔄' : '⬜';
      html += `<div class="tree-indent"><div class="tree-item file" onclick="showFile('tasks/${task.id}.json', ${escapeAttr(JSON.stringify(task, null, 2))})">
        <span class="icon">${icon}</span> ${task.id}.json</div></div>`;
    }
  }
  
  el.innerHTML = html;
}

function updateTasksList(tasks) {
  const el = document.getElementById('tasksList');
  el.innerHTML = '';
  for (const task of tasks) {
    const statusIcon = task.status === 'completed' ? '✅' : task.status === 'in_progress' ? '🔄' : '⬜';
    const ownerText = task.owner ? `→ ${AGENTS[task.owner]?.emoji || ''} ${task.owner}` : '';
    el.innerHTML += `
      <div class="task-item">
        <div class="task-header">
          <span class="task-status ${task.status}">${statusIcon}</span>
          <span class="task-subject">#${task.id} ${task.subject}</span>
        </div>
        <div class="task-owner">${ownerText} ${task.status}</div>
      </div>`;
  }
}

function addEventLog(type, data, timestamp) {
  const el = document.getElementById('eventLog');
  const time = new Date(timestamp).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  let text = '';
  
  switch (type) {
    case 'message': text = `${data.message?.from} → ${data.recipient}: ${(data.message?.text || '').slice(0, 60)}`; break;
    case 'task_created': text = `태스크 #${data.id} 생성: ${data.subject}`; break;
    case 'task_claimed': text = `${data.owner}이(가) 태스크 #${data.id} claim`; break;
    case 'task_completed': text = `태스크 #${data.id} 완료!`; break;
    case 'agent_action': text = `${data.agent}: ${data.action} ${data.to ? '→ ' + data.to : ''} ${(data.text || '').slice(0, 50)}`; break;
    case 'read': text = `${data.agentName}이(가) ${data.count}개 메시지 읽음`; break;
    case 'init': text = '팀 초기화 완료'; break;
    case 'complete': text = data.text; break;
    default: text = JSON.stringify(data).slice(0, 80);
  }
  
  el.innerHTML += `
    <div class="event-item">
      <span class="event-time">${time}</span>
      <span class="event-type ${type}">${type}</span>
      <span class="event-text">${escapeHtml(text)}</span>
    </div>`;
  el.scrollTop = el.scrollHeight;
}

function setAgentStatus(name, status) {
  const el = document.getElementById(`status-${name}`);
  if (!el) return;
  el.className = `agent-status ${status}`;
  el.textContent = status === 'active' ? '작업 중' : status === 'idle' ? '유휴' : '대기';
  
  // 카드 하이라이트
  const card = document.getElementById(`card-${name}`);
  if (card) {
    card.style.borderColor = AGENTS[name]?.color || '#3b4261';
    setTimeout(() => { card.style.borderColor = '#3b4261'; }, 1500);
  }
}

function highlightAgent(name) {
  const card = document.getElementById(`card-${name}`);
  if (card) {
    card.style.boxShadow = `0 0 12px ${AGENTS[name]?.color || '#7aa2f7'}40`;
    setTimeout(() => { card.style.boxShadow = 'none'; }, 1000);
  }
}

function showFile(name, content) {
  document.getElementById('modalTitle').textContent = name;
  document.getElementById('modalContent').textContent = typeof content === 'string' ? content : JSON.stringify(JSON.parse(content), null, 2);
  document.getElementById('fileModal').classList.add('show');
}
function closeModal() { document.getElementById('fileModal').classList.remove('show'); }

function escapeHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escapeAttr(s) { return JSON.stringify(s).replace(/'/g, "\\'"); }

let isStepMode = false;

async function startScenario() {
  document.getElementById('autoBtn').disabled = true;
  document.getElementById('stepStartBtn').disabled = true;
  document.getElementById('stepBar').style.display = 'none';
  isStepMode = false;
  await fetch('/api/scenario/start', { method: 'POST' });
  setTimeout(() => { 
    document.getElementById('autoBtn').disabled = false;
    document.getElementById('stepStartBtn').disabled = false;
  }, 30000);
}

async function startStepMode() {
  isStepMode = true;
  document.getElementById('autoBtn').style.display = 'none';
  document.getElementById('stepStartBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'inline-block';
  document.getElementById('stepBar').style.display = 'block';
  document.getElementById('stepDesc').textContent = '⏭ "다음 스텝" 버튼을 눌러 한 단계씩 진행하세요';
  document.getElementById('stepCounter').textContent = '준비';
  await fetch('/api/scenario/step-start', { method: 'POST' });
}

async function nextStep() {
  document.getElementById('nextBtn').disabled = true;
  const res = await fetch('/api/scenario/next-step', { method: 'POST' });
  const data = await res.json();
  
  if (data.status === 'complete') {
    document.getElementById('nextBtn').style.display = 'none';
    document.getElementById('stepDesc').textContent = '✅ 시나리오 완료!';
    document.getElementById('stepProgressFill').style.width = '100%';
    return;
  }
  
  document.getElementById('nextBtn').disabled = false;
  // 키보드로도 다음 스텝 가능하게 포커스
  document.getElementById('nextBtn').focus();
}

async function resetScenario() {
  isStepMode = false;
  document.getElementById('autoBtn').style.display = 'inline-block';
  document.getElementById('stepStartBtn').style.display = 'inline-block';
  document.getElementById('autoBtn').disabled = false;
  document.getElementById('stepStartBtn').disabled = false;
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('stepBar').style.display = 'none';
  await fetch('/api/scenario/reset', { method: 'POST' });
}

// 키보드 단축키: Space 또는 → 로 다음 스텝
document.addEventListener('keydown', (e) => {
  if (!isStepMode) return;
  if (e.code === 'Space' || e.code === 'ArrowRight') {
    e.preventDefault();
    const btn = document.getElementById('nextBtn');
    if (btn && !btn.disabled && btn.style.display !== 'none') nextStep();
  }
});

// 초기화
initAgentCards();
connect();
</script>
</body>
</html>
