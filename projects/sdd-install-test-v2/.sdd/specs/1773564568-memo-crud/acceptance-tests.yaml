# acceptance-tests.yaml
# 출처: requirements.md AC
# 자동 추출 — spec-requirements 단계

tests:
  - id: "AC-001-1"
    requirement: "REQ-001 UUID v4 식별자"
    acceptance_criteria: "생성된 메모의 id는 UUID v4 형식이다"
    scenario: "메모를 생성한다"
    expected: "id가 UUID v4 정규식 패턴과 일치"

  - id: "AC-001-2"
    requirement: "REQ-001 UUID v4 식별자"
    acceptance_criteria: "두 개의 메모를 생성하면 서로 다른 id를 가진다"
    scenario: "메모 두 개를 생성한다"
    expected: "두 id가 서로 다름"

  - id: "AC-002-1"
    requirement: "REQ-002 title 저장"
    acceptance_criteria: "메모 생성 시 title이 저장된다"
    scenario: "title='테스트'로 메모 생성"
    expected: "반환된 메모의 title이 '테스트'"

  - id: "AC-002-2"
    requirement: "REQ-002 빈 title 거부"
    acceptance_criteria: "빈 문자열 title은 허용하지 않는다"
    scenario: "title=''으로 메모 생성"
    expected: "에러 발생"

  - id: "AC-005-1"
    requirement: "REQ-005 메모 생성"
    acceptance_criteria: "title과 content를 전달하면 완전한 메모가 반환된다"
    scenario: "title과 content 전달"
    expected: "id, title, content, createdAt, updatedAt 포함 메모 반환"

  - id: "AC-006-1"
    requirement: "REQ-006 전체 조회"
    acceptance_criteria: "메모가 없으면 빈 배열을 반환한다"
    scenario: "빈 상태에서 목록 조회"
    expected: "빈 배열 반환"

  - id: "AC-007-2"
    requirement: "REQ-007 ID 조회 실패"
    acceptance_criteria: "존재하지 않는 id로 조회하면 null을 반환한다"
    scenario: "없는 id로 조회"
    expected: "null 반환"

  - id: "AC-008-1"
    requirement: "REQ-008 메모 수정"
    acceptance_criteria: "title만 변경하면 content는 유지"
    scenario: "title만 변경"
    expected: "title 갱신, content 유지"

  - id: "AC-009-1"
    requirement: "REQ-009 메모 삭제"
    acceptance_criteria: "존재하는 id로 삭제하면 true"
    scenario: "존재하는 메모 삭제"
    expected: "true 반환, 이후 조회 시 null"

  - id: "AC-010-1"
    requirement: "REQ-010 영속성"
    acceptance_criteria: "메모 생성 후 JSON 파일에 저장"
    scenario: "메모 생성 후 파일 확인"
    expected: "JSON 파일에 메모 데이터 존재"

  - id: "AC-011-1"
    requirement: "REQ-011 자동 파일 생성"
    acceptance_criteria: "데이터 파일이 없는 상태에서 첫 조회 시 빈 배열"
    scenario: "파일 없는 상태에서 조회"
    expected: "빈 배열 반환"
