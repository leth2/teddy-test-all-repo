version: '3.8'

services:
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3001']
      interval: 10s
      timeout: 5s
      retries: 3

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - '5173:5173'
    environment:
      - VITE_WS_URL=ws://localhost:3001
    depends_on:
      - agent
    restart: unless-stopped

networks:
  default:
    name: cline-acp-ws-network
