version: '3.8'

services:
  agent:
    build: ./agent
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - ANTHROPIC_API_KEY=${TEDDY_CLAUDE_CODE_TOKEN:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
    volumes:
      - ~/.claude:/root/.claude:ro
    networks:
      - acp-network

  ui:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./ui:/app
    ports:
      - "5174:5174"
    environment:
      - VITE_SERVER_URL=http://localhost:3002
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - agent
    networks:
      - acp-network

networks:
  acp-network:
    driver: bridge
