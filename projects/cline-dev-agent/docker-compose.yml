services:
  agent:
    build: ./agent
    ports:
      - "${PORT:-3002}:3002"
    volumes:
      - ${CLINE_AUTH_DIR:-~/.cline}:/root/.cline:ro
      - ${WORKTREE_PATH:-.}:/workspace
    environment:
      - PORT=3002
      - WORKSPACE=/workspace
      - SPEC_ID=${SPEC_ID:-dev}
      - WORKTREE=${WORKTREE_PATH:-.}
      - BRANCH=${BRANCH:-main}

  ui:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./ui:/app
    ports:
      - "${UI_PORT:-5174}:5174"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5174"
    environment:
      - VITE_AGENT_URL=http://localhost:${PORT:-3002}
    depends_on:
      - agent
