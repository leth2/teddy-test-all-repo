version: '3.8'

services:
  # ACP bridge server — spawns claude-agent-acp and bridges it to SSE
  agent-bridge:
    build: ./agent
    ports:
      - "3002:3002"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./workspace:/workspace   # shared workspace the agent can read/write
    working_dir: /workspace

  # React UI — Vite dev server (port 5174)
  ui:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./ui:/app
    ports:
      - "5174:5174"
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - agent-bridge
