version: '3.8'

services:
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - acp-network

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "5174:5174"
    depends_on:
      - agent
    restart: unless-stopped
    networks:
      - acp-network

networks:
  acp-network:
    driver: bridge
